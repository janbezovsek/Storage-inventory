version: '3.8'

services:
  db:
    image: mysql:8
    container_name: storage_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: storage_inventory
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: storage_server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: storage_inventory
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost
    volumes:
      - uploads_data:/app/uploads

  client:
    build: ./client
    container_name: storage_client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  db_data:
  uploads_data: